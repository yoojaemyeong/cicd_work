- name: Slack 성공 알림
  if: success()
  run: |
    curl -X POST https://slack.com/api/chat.postMessage \
      -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
      -H "Content-type: application/json" \
      --data "{
        \"channel\": \"#deploy\",
        \"text\": \"✅ 배포 성공!\"
      }"

- name: Slack 실패 알림
  if: failure()
  run: |
    curl -X POST https://slack.com/api/chat.postMessage \
      -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
      -H "Content-type: application/json" \
      --data "{
        \"channel\": \"#deploy\",
        \"text\": \"❌ 배포 실패!\"
      }"